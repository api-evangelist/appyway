naftiko: 1.0.0-alpha2
info:
  label: AppyWay Platform API — VehicleTypes
  description: 'AppyWay Platform API — VehicleTypes. 1 operations. Lead operation: AppyWay Fetch All Vehicle Types. Self-contained
    Naftiko capability covering one Appyway business surface.'
  tags:
  - Appyway
  - VehicleTypes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APPYWAY_API_KEY: APPYWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-vehicletypes
    baseUri: https://api.appyway.com/v1/reference
    description: AppyWay Platform API — VehicleTypes business capability. Self-contained, no shared references.
    resources:
    - name: fetchAllVehicleTypes
      path: /fetchAllVehicleTypes
      operations:
      - name: postfetchallvehicletypes
        method: POST
        description: AppyWay Fetch All Vehicle Types
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.APPYWAY_API_KEY}}'
  exposes:
  - type: rest
    namespace: platform-vehicletypes-rest
    port: 8080
    description: REST adapter for AppyWay Platform API — VehicleTypes. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/fetchallvehicletypes
      name: fetchallvehicletypes
      description: REST surface for fetchAllVehicleTypes.
      operations:
      - method: POST
        name: postfetchallvehicletypes
        description: AppyWay Fetch All Vehicle Types
        call: platform-vehicletypes.postfetchallvehicletypes
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-vehicletypes-mcp
    port: 9090
    transport: http
    description: MCP adapter for AppyWay Platform API — VehicleTypes. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: appyway-fetch-all-vehicle-types
      description: AppyWay Fetch All Vehicle Types
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: platform-vehicletypes.postfetchallvehicletypes
      outputParameters:
      - type: object
        mapping: $.
