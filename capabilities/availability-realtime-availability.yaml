    by entity Ids. Self-contained Naftiko capability covering one Appyway business surface.'
  tags:
  - Appyway
  - Availability
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APPYWAY_API_KEY: APPYWAY_API_KEY
capability:
