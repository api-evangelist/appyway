    port: 9090
    transport: http
    description: MCP adapter for AppyWay Availability RealTime API — Availability. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: appyway-fetch-realtime-availability-entity
      description: AppyWay Fetch realtime availability by entity Ids
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: availability-realtime-availability.postqueriesfetchavailabilitybyentityids
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
