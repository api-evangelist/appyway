    namespace: availability-realtime-availability
    baseUri: https://api.appyway.com/v1/availability-realtime
    description: AppyWay Availability RealTime API — Availability business capability. Self-contained, no shared references.
    resources:
    - name: queries-fetchAvailabilityByEntityIds
      path: /queries/fetchAvailabilityByEntityIds
      operations:
      - name: postqueriesfetchavailabilitybyentityids
        method: POST
        description: AppyWay Fetch realtime availability by entity Ids
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
