      name: queries-fetchavailabilitybyentityids
      description: REST surface for queries-fetchAvailabilityByEntityIds.
      operations:
      - method: POST
        name: postqueriesfetchavailabilitybyentityids
        description: AppyWay Fetch realtime availability by entity Ids
        call: availability-realtime-availability.postqueriesfetchavailabilitybyentityids
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
