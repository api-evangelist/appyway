naftiko: 1.0.0-alpha2
info:
  label: AppyWay Platform API — BaseMaps
  description: 'AppyWay Platform API — BaseMaps. 1 operations. Lead operation: AppyWay Fetch All Base Maps. Self-contained
    Naftiko capability covering one Appyway business surface.'
  tags:
  - Appyway
  - BaseMaps
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APPYWAY_API_KEY: APPYWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-basemaps
    baseUri: https://api.appyway.com/v1/reference
    description: AppyWay Platform API — BaseMaps business capability. Self-contained, no shared references.
    resources:
    - name: fetchAllBaseMaps
      path: /fetchAllBaseMaps
      operations:
      - name: postfetchallbasemaps
        method: POST
        description: AppyWay Fetch All Base Maps
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.APPYWAY_API_KEY}}'
  exposes:
  - type: rest
    namespace: platform-basemaps-rest
    port: 8080
    description: REST adapter for AppyWay Platform API — BaseMaps. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/fetchallbasemaps
      name: fetchallbasemaps
      description: REST surface for fetchAllBaseMaps.
      operations:
      - method: POST
        name: postfetchallbasemaps
        description: AppyWay Fetch All Base Maps
        call: platform-basemaps.postfetchallbasemaps
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-basemaps-mcp
    port: 9090
    transport: http
    description: MCP adapter for AppyWay Platform API — BaseMaps. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: appyway-fetch-all-base-maps
      description: AppyWay Fetch All Base Maps
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: platform-basemaps.postfetchallbasemaps
      outputParameters:
      - type: object
        mapping: $.
