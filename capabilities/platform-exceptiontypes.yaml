naftiko: 1.0.0-alpha2
info:
  label: AppyWay Platform API — ExceptionTypes
  description: 'AppyWay Platform API — ExceptionTypes. 1 operations. Lead operation: AppyWay Fetch All Exception Types. Self-contained
    Naftiko capability covering one Appyway business surface.'
  tags:
  - Appyway
  - ExceptionTypes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APPYWAY_API_KEY: APPYWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-exceptiontypes
    baseUri: https://api.appyway.com/v1/reference
    description: AppyWay Platform API — ExceptionTypes business capability. Self-contained, no shared references.
    resources:
    - name: fetchAllExceptionTypes
      path: /fetchAllExceptionTypes
      operations:
      - name: postfetchallexceptiontypes
        method: POST
        description: AppyWay Fetch All Exception Types
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.APPYWAY_API_KEY}}'
  exposes:
  - type: rest
    namespace: platform-exceptiontypes-rest
    port: 8080
    description: REST adapter for AppyWay Platform API — ExceptionTypes. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/fetchallexceptiontypes
      name: fetchallexceptiontypes
      description: REST surface for fetchAllExceptionTypes.
      operations:
      - method: POST
        name: postfetchallexceptiontypes
        description: AppyWay Fetch All Exception Types
        call: platform-exceptiontypes.postfetchallexceptiontypes
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-exceptiontypes-mcp
    port: 9090
    transport: http
    description: MCP adapter for AppyWay Platform API — ExceptionTypes. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: appyway-fetch-all-exception-types
      description: AppyWay Fetch All Exception Types
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: platform-exceptiontypes.postfetchallexceptiontypes
      outputParameters:
      - type: object
        mapping: $.
