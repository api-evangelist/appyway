naftiko: 1.0.0-alpha2
info:
  label: AppyWay Platform API — FacilityTypes
  description: 'AppyWay Platform API — FacilityTypes. 1 operations. Lead operation: AppyWay Fetch All Facility Types. Self-contained
    Naftiko capability covering one Appyway business surface.'
  tags:
  - Appyway
  - FacilityTypes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APPYWAY_API_KEY: APPYWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-facilitytypes
    baseUri: https://api.appyway.com/v1/reference
    description: AppyWay Platform API — FacilityTypes business capability. Self-contained, no shared references.
    resources:
    - name: fetchAllFacilityTypes
      path: /fetchAllFacilityTypes
      operations:
      - name: postfetchallfacilitytypes
        method: POST
        description: AppyWay Fetch All Facility Types
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.APPYWAY_API_KEY}}'
  exposes:
  - type: rest
    namespace: platform-facilitytypes-rest
    port: 8080
    description: REST adapter for AppyWay Platform API — FacilityTypes. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/fetchallfacilitytypes
      name: fetchallfacilitytypes
      description: REST surface for fetchAllFacilityTypes.
      operations:
      - method: POST
        name: postfetchallfacilitytypes
        description: AppyWay Fetch All Facility Types
        call: platform-facilitytypes.postfetchallfacilitytypes
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-facilitytypes-mcp
    port: 9090
    transport: http
    description: MCP adapter for AppyWay Platform API — FacilityTypes. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: appyway-fetch-all-facility-types
      description: AppyWay Fetch All Facility Types
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: platform-facilitytypes.postfetchallfacilitytypes
      outputParameters:
      - type: object
        mapping: $.
