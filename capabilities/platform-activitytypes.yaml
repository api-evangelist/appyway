naftiko: 1.0.0-alpha2
info:
  label: AppyWay Platform API — ActivityTypes
  description: 'AppyWay Platform API — ActivityTypes. 1 operations. Lead operation: AppyWay Fetch All Activity Types. Self-contained
    Naftiko capability covering one Appyway business surface.'
  tags:
  - Appyway
  - ActivityTypes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APPYWAY_API_KEY: APPYWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-activitytypes
    baseUri: https://api.appyway.com/v1/reference
    description: AppyWay Platform API — ActivityTypes business capability. Self-contained, no shared references.
    resources:
    - name: fetchAllActivityTypes
      path: /fetchAllActivityTypes
      operations:
      - name: postfetchallactivitytypes
        method: POST
        description: AppyWay Fetch All Activity Types
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.APPYWAY_API_KEY}}'
  exposes:
  - type: rest
    namespace: platform-activitytypes-rest
    port: 8080
    description: REST adapter for AppyWay Platform API — ActivityTypes. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/fetchallactivitytypes
      name: fetchallactivitytypes
      description: REST surface for fetchAllActivityTypes.
      operations:
      - method: POST
        name: postfetchallactivitytypes
        description: AppyWay Fetch All Activity Types
        call: platform-activitytypes.postfetchallactivitytypes
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-activitytypes-mcp
    port: 9090
    transport: http
    description: MCP adapter for AppyWay Platform API — ActivityTypes. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: appyway-fetch-all-activity-types
      description: AppyWay Fetch All Activity Types
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: platform-activitytypes.postfetchallactivitytypes
      outputParameters:
      - type: object
        mapping: $.
