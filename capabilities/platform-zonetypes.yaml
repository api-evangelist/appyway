naftiko: 1.0.0-alpha2
info:
  label: AppyWay Platform API — ZoneTypes
  description: 'AppyWay Platform API — ZoneTypes. 1 operations. Lead operation: AppyWay Fetch All Zone Types. Self-contained
    Naftiko capability covering one Appyway business surface.'
  tags:
  - Appyway
  - ZoneTypes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APPYWAY_API_KEY: APPYWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-zonetypes
    baseUri: https://api.appyway.com/v1/reference
    description: AppyWay Platform API — ZoneTypes business capability. Self-contained, no shared references.
    resources:
    - name: fetchAllZoneTypes
      path: /fetchAllZoneTypes
      operations:
      - name: postfetchallzonetypes
        method: POST
        description: AppyWay Fetch All Zone Types
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.APPYWAY_API_KEY}}'
  exposes:
  - type: rest
    namespace: platform-zonetypes-rest
    port: 8080
    description: REST adapter for AppyWay Platform API — ZoneTypes. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/fetchallzonetypes
      name: fetchallzonetypes
      description: REST surface for fetchAllZoneTypes.
      operations:
      - method: POST
        name: postfetchallzonetypes
        description: AppyWay Fetch All Zone Types
        call: platform-zonetypes.postfetchallzonetypes
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-zonetypes-mcp
    port: 9090
    transport: http
    description: MCP adapter for AppyWay Platform API — ZoneTypes. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: appyway-fetch-all-zone-types
      description: AppyWay Fetch All Zone Types
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: platform-zonetypes.postfetchallzonetypes
      outputParameters:
      - type: object
        mapping: $.
