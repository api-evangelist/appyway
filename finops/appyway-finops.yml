description: FOCUS-aligned FinOps placeholder for AppyWay. No public billing-model details, meters, or
  invoice schema are published; this artifact records the absence so consumers know to source commercial
  terms from the provider directly.
notes: AppyWay does not publish public pricing for its Availability, Traffic Data, Explorer, or Platform
  APIs. Commercial access is arranged through direct sales — the docs portal is open but plan tiers, per-call
  rates, and quotas are not disclosed.
