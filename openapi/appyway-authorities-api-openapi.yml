      - 4
      - 5
      - 7
      - 8
      - 9
      - 10
      - 11
      - 12
      type: integer
      description: "Known zone types.\n\n*ControlledParkingZone (1) - An ordinary zone in which authority-defined restrictions are in place.\n*RestrictedParkingZone (2) - A zone in which parking is never allowed.\n*FreeParking (3) - A zone in which parking is always allowed.\n*Private (4) - A region not under authority control (such as a shopping centre).\n*CongestionCharge (5) - A region in which congestion charges apply.\n*Container (7) - A zone that exists to contain OSPs that don't really belong in a zone.\n*ResidentsParkingScheme (8) - Same structure as a controlled parking zone\n*PermitParkingArea (9) - Area of residential streets where parking is reserved for permit holders Gn++n++ a sign at the entrance to the street will show that parking is for permit holders only. \nPPAs may not have signs or bay markings within them. Sometimes there may be small plates to remind motorists of the controls in place\n*PedestrianZone (10) - Area where no parking is allowed\n*PedestrianAndCycleZone (11) - Area where no parking is allowed\n*Estate (12) - A housing estate under authority control.\n"
