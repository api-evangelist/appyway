          nullable: true
      additionalProperties: false
      description: A set of adjustments to the price defined in a Ylp.Cms.Core.Domain.Model.TariffDetailCms according to the bands defined in a Ylp.Cms.Core.Domain.Model.Sets.EmissionsBandSet.
